
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#1a6b5a"/>
<title>Family Portal — Proximity Care</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>

html,body{min-height:100vh;font-family:var(--sans),sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* PIN GATE */
.gate{position:fixed;inset:0;background:var(--surface);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.gate.hide{display:none;}
.gate-inner{width:100%;max-width:380px;}
.gate-brand{font-family:'Inter',sans-serif;font-size:22px;font-weight:600;color:var(--text);text-align:center;margin-bottom:4px;}
.gate-brand em{color:var(--green);font-style:normal;}
.gate-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:40px;}
.gate-card{background:var(--bg2);border-radius:16px;padding:36px 28px;border:1px solid var(--border2);}
.gate-icon{width:56px;height:56px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--green);}
.gate-icon svg{width:28px;height:28px;}
.gate-title{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;text-align:center;margin-bottom:6px;color:var(--text);}
.gate-hint{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:32px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all 0.15s;}
.pin-dot.filled{background:var(--green);border-color:var(--green);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:16px;font-size:20px;font-weight:500;font-family:'Inter',sans-serif;color:var(--text);cursor:pointer;transition:background 0.15s,border-color 0.15s;text-align:center;min-height:56px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.pin-btn:hover{background:var(--green-l);border-color:var(--accent);}
.pin-btn:active{transform:scale(0.96);}
.pin-btn.del{font-size:16px;color:var(--muted);}
.pin-btn.del svg{width:20px;height:20px;display:block;margin:0 auto;}
.pin-btn.empty{background:none;border:none;cursor:default;}
.pin-error{text-align:center;font-size:13px;color:var(--error);margin-top:16px;opacity:0;transition:opacity 0.2s;min-height:20px;}
.pin-error.show{opacity:1;}
@keyframes pin-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.gate-card.shake{animation:pin-shake 0.35s ease;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.app.show{display:flex;}

/* TOPBAR */
.topbar{background:rgba(7,9,12,.96);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.tb-brand{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal2);}
.tb-brand em{color:var(--green);font-style:normal;}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-name{font-size:13px;color:var(--muted);font-weight:500;}
.tb-signout{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;padding:6px 10px;border-radius:6px;font-family:'Inter',sans-serif;transition:color 0.15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tb-signout:hover{color:var(--text);}

/* CONTENT */
.content{flex:1;padding:24px 20px;padding-bottom:calc(88px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;width:100%;transition:opacity 150ms ease;}

/* STATUS CARD */
.status-card{background:var(--green);border-radius:20px;padding:28px 24px;margin-bottom:24px;color:white;position:relative;overflow:hidden;}
.status-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06);}
.status-eyebrow{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.65;margin-bottom:8px;font-weight:500;}
.status-name{font-family:'Inter',sans-serif;font-size:26px;font-weight:600;margin-bottom:4px;}
.status-detail{font-size:13px;opacity:0.8;line-height:1.5;}
.status-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:100px;padding:5px 12px;font-size:12px;margin-top:14px;font-weight:500;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#7dffb3;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* SECTION */
.section{margin-bottom:24px;}
.section-title{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding:0 2px;font-weight:600;}

/* CARDS */
.card{background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);transition:background .12s;}
.card-row:last-child{border:none;}
.card-row:hover{background:var(--surface);}
.card-row-label{font-size:13px;color:var(--muted);}
.card-row-value{font-size:14px;font-weight:500;text-align:right;color:var(--text);}
.card-row-value.green{color:var(--green);}

/* PSW CARD */
.psw-card{background:var(--bg2);border-radius:12px;padding:20px;border:1px solid var(--border);display:flex;align-items:center;gap:16px;margin-bottom:24px;transition:background 0.15s;}
.psw-card:hover{background:var(--surface);}
.psw-avatar{width:56px;height:56px;border-radius:50%;background:var(--green-l);border:2px solid var(--green-b);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:20px;color:var(--green);font-weight:600;flex-shrink:0;}
.psw-info{flex:1;}
.psw-name{font-size:16px;font-weight:600;margin-bottom:2px;color:var(--text);}
.psw-title{font-size:12px;color:var(--muted);}
.psw-schedule{font-size:12px;color:var(--accent);margin-top:4px;font-weight:500;}

/* VISIT ROWS */
.visit-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px;transition:background .12s;cursor:pointer;}
.visit-row:last-child{border:none;}
.visit-row:hover{background:var(--surface);}
.visit-date-box{width:44px;text-align:center;flex-shrink:0;}
.visit-date-day{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:500;}
.visit-date-num{font-family:'Inter',sans-serif;font-size:22px;color:var(--text);line-height:1;font-weight:600;}
.visit-info{flex:1;}
.visit-psw{font-size:14px;font-weight:500;color:var(--text);}
.visit-time{font-size:12px;color:var(--muted);margin-top:2px;}
.visit-hours{font-size:13px;font-weight:600;color:var(--accent);}

/* DOCS */
.doc-row{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;text-decoration:none;color:inherit;transition:background 0.15s;}
.doc-row:last-child{border:none;}
.doc-row:hover{background:var(--surface);}
.doc-icon{width:36px;height:36px;border-radius:10px;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green);}
.doc-icon svg{width:18px;height:18px;}
.doc-info{flex:1;}
.doc-name{font-size:14px;font-weight:500;color:var(--text);}
.doc-type{font-size:12px;color:var(--muted);margin-top:1px;}
.doc-arrow{color:var(--muted);}
.doc-arrow svg{width:16px;height:16px;display:block;}

/* INVOICE ROWS */
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);transition:background 0.15s;}
.inv-row:last-child{border:none;}
.inv-row:hover{background:var(--surface);}
.inv-month{font-size:14px;font-weight:500;color:var(--text);}
.inv-right{text-align:right;}
.inv-amount{font-size:14px;font-weight:600;color:var(--accent);}
.inv-status{font-size:11px;color:var(--muted);margin-top:2px;}

/* MESSAGE THREAD */
.msg-thread-wrap{background:var(--bg);border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid var(--border);margin-bottom:24px;}
.msg-thread-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto;}
.msg-bubble-out{background:var(--green);color:#fff;padding:10px 14px;border-radius:14px 14px 3px 14px;max-width:85%;margin-left:auto;font-size:13px;line-height:1.5;}
.msg-bubble-in{background:var(--surface);color:var(--text);padding:10px 14px;border-radius:14px 14px 14px 3px;max-width:85%;border:1px solid var(--border);font-size:13px;line-height:1.5;}
.msg-bubble-time{font-size:10px;opacity:.55;margin-top:3px;}
.msg-input-row{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border);align-items:flex-end;}
.msg-input-field{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);outline:none;resize:none;transition:border-color 0.15s;}
.msg-input-field:focus{border-color:var(--accent);}
.msg-send-btn{width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background 0.15s;}
.msg-send-btn:hover{background:var(--green-d);}
.msg-send-btn svg{width:18px;height:18px;}
.msg-char-count{font-size:11px;color:var(--muted);text-align:right;padding:0 20px 8px;font-family:'Inter',sans-serif;}
.msg-char-count.near{color:var(--warning);}
.msg-char-count.over{color:var(--error);}

/* VISIT DETAIL */
.visit-detail{padding:12px 20px 16px;border-top:1px solid var(--border);background:var(--surface);}
.visit-detail-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;margin-top:10px;font-weight:600;}
.visit-detail-val{font-size:13px;color:var(--text);line-height:1.6;}
.visit-expand-btn{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block;font-weight:500;}

/* UPCOMING */
.upcoming-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);gap:12px;transition:background 0.15s;}
.upcoming-row:last-child{border:none;}
.upcoming-row:hover{background:var(--surface);}
.upcoming-date{width:40px;text-align:center;flex-shrink:0;}
.upcoming-date-dow{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:500;}
.upcoming-date-num{font-family:'Inter',sans-serif;font-size:20px;color:var(--text);line-height:1;font-weight:600;}
.upcoming-info{flex:1;}
.upcoming-psw{font-size:13px;font-weight:500;color:var(--text);}
.upcoming-time{font-size:12px;color:var(--muted);margin-top:2px;}
.upcoming-badge{font-size:10px;padding:3px 10px;border-radius:100px;background:var(--green-l);color:var(--green);font-weight:600;flex-shrink:0;}

/* CARE PLAN */
.plan-text{padding:20px;font-size:14px;color:var(--text);line-height:1.8;}

/* EMPTY STATES */
.empty-state{padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.empty-state-icon{color:var(--muted);opacity:0.45;}
.empty-state-icon svg{width:48px;height:48px;}
.empty-state-title{font-size:16px;font-weight:500;color:var(--text);}
.empty-state-sub{font-size:14px;color:var(--muted);line-height:1.5;max-width:240px;}

/* LOADING */
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:12px 4px 14px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Inter',sans-serif;transition:color 0.15s;color:var(--muted);touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.nav-icon{display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color 0.15s;}
.nav-icon svg{width:22px;height:22px;}
.nav-label{font-size:10px;letter-spacing:0.02em;color:var(--muted);transition:color 0.15s;font-weight:500;}
.nav-btn.on .nav-label{color:var(--green);}
.nav-btn.on .nav-icon{color:var(--green);}

/* SATISFACTION STARS */
.visit-stars{display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap;}
.visit-stars.rated{font-size:14px;color:#c8a040;letter-spacing:1px;}
.visit-stars.unrated .star-btn{background:none;border:none;font-size:18px;color:#c8d0c8;cursor:pointer;padding:0 1px;min-height:32px;min-width:28px;line-height:1;transition:color .15s;}
.visit-stars.unrated .star-btn:hover,.visit-stars.unrated .star-btn:focus{color:#c8a040;}
.stars-label{font-size:10px;color:var(--muted);letter-spacing:0.5px;margin-left:4px;}

/* SKELETON */
.skeleton-wrap{padding:24px 20px;}
.skeleton-block{border-radius:14px;background:linear-gradient(90deg,#f0f0f0 25%,#f8f8f8 50%,#f0f0f0 75%);background-size:200% 100%;animation:fam-shimmer 1.4s infinite;margin-bottom:14px;}
@keyframes fam-shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skeleton-status{height:120px;border-radius:20px;margin-bottom:24px;}
.skeleton-card-sm{height:80px;}
.skeleton-card-md{height:120px;}
.skeleton-card-lg{height:200px;}

button{transition:transform 50ms ease;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
button:active{transform:scale(0.98);}
.pin-btn:active{transform:scale(0.96);}

/* ── FAMILY PORTAL DARK THEME NEW FEATURES ── */
.fam-alert-banner{margin:16px 16px 0;padding:12px 14px;border-radius:10px;}
.fam-alert-banner.info{background:rgba(61,138,122,.06);border:1px solid rgba(61,138,122,.2);}
.fam-alert-banner.warn{background:rgba(224,154,61,.06);border:1px solid rgba(224,154,61,.2);}
.fam-alert-banner.crit{background:rgba(224,85,85,.06);border:1px solid rgba(224,85,85,.2);}
.fam-alert-lbl{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.fam-alert-lbl.info{color:var(--teal2);}
.fam-alert-lbl.warn{color:var(--amber);}
.fam-alert-lbl.crit{color:var(--red);}
.fam-alert-msg{font-size:13px;color:var(--muted2);line-height:1.6;}
/* Vitals row in visit detail */
.vitals-compact{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.vitals-pill{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:100px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);}
.vitals-pill.ok{color:var(--teal2);border-color:rgba(61,138,122,.3);}
.vitals-pill.flag{color:var(--amber);border-color:rgba(224,154,61,.3);}
/* ETA banner */
.eta-banner{margin:12px 16px 0;padding:12px 14px;background:rgba(61,138,122,.06);border:1px solid rgba(61,138,122,.2);border-radius:10px;display:flex;align-items:center;gap:10px;}
.eta-dot{width:8px;height:8px;border-radius:50%;background:var(--teal2);animation:livepulse 1.5s infinite;flex-shrink:0;}
@keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.eta-text{font-size:13px;color:var(--text);}
.eta-time{font-family:var(--mono);font-size:11px;color:var(--teal2);margin-top:2px;}
/* Care plan ack */
.care-ack-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:100px;background:rgba(61,138,122,.06);border:1px solid rgba(61,138,122,.2);color:var(--teal2);margin-top:6px;}
/* Alert badges on client header */
.client-alert-chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:100px;border:1px solid;margin-right:4px;}
.client-alert-chip.fall{color:var(--amber);border-color:rgba(224,154,61,.3);}
.client-alert-chip.allergy{color:var(--red);border-color:rgba(224,85,85,.3);}
.client-alert-chip.env{color:#6dbdd4;border-color:rgba(109,189,212,.3);}
/* Section headers dark style */
.section-title{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

:root{
  /* Dark theme — matches PSW portal + HQ design system */
  --bg:#07090c;
  --bg2:#0d1117;
  --bg3:#161c24;
  --surface:#0d1117;
  --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.1);
  --text:#f0ede8;
  --muted:#a8bfc4;
  --muted2:#a8bfc4;
  --accent:#3d8a7a;
  --teal:#2d7a6a;
  --teal2:#3d8a7a;
  --teal3:#4d9a8a;
  --gold:#c8a96e;
  --red:#e05555;
  --amber:#e09a3d;
  --green2:#4a9a6e;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --serif:'Cormorant Garamond',serif;
  /* Legacy aliases */
  --success:#4a9a6e;
  --warning:#e09a3d;
  --error:#e05555;
  --green:#4a9a6e;
  --green-l:rgba(74,154,110,.1);
  --green-b:rgba(74,154,110,.2);
  --green-d:#2a6a4a;
  --shadow:rgba(0,0,0,.3);
}

.app.show{display:flex;}

/* TOPBAR */
.topbar{background:rgba(7,9,12,.96);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.tb-brand{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal2);}
.tb-brand em{color:var(--green);font-style:normal;}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-name{font-size:13px;color:var(--muted);font-weight:500;}
.tb-signout{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;padding:6px 10px;border-radius:6px;font-family:'Inter',sans-serif;transition:color 0.15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tb-signout:hover{color:var(--text);}

/* CONTENT */
.content{flex:1;padding:24px 20px;padding-bottom:calc(88px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;width:100%;transition:opacity 150ms ease;}

/* STATUS CARD */
.status-card{background:var(--green);border-radius:20px;padding:28px 24px;margin-bottom:24px;color:white;position:relative;overflow:hidden;}
.status-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06);}
.status-eyebrow{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.65;margin-bottom:8px;font-weight:500;}
.status-name{font-family:'Inter',sans-serif;font-size:26px;font-weight:600;margin-bottom:4px;}
.status-detail{font-size:13px;opacity:0.8;line-height:1.5;}
.status-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:100px;padding:5px 12px;font-size:12px;margin-top:14px;font-weight:500;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#7dffb3;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* SECTION */
.section{margin-bottom:24px;}
.section-title{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding:0 2px;font-weight:600;}

/* CARDS */
.card{background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);transition:background .12s;}
.card-row:last-child{border:none;}
.card-row:hover{background:var(--surface);}
.card-row-label{font-size:13px;color:var(--muted);}
.card-row-value{font-size:14px;font-weight:500;text-align:right;color:var(--text);}
.card-row-value.green{color:var(--green);}

/* PSW CARD */
.psw-card{background:var(--bg2);border-radius:12px;padding:20px;border:1px solid var(--border);display:flex;align-items:center;gap:16px;margin-bottom:24px;transition:background 0.15s;}
.psw-card:hover{background:var(--surface);}
.psw-avatar{width:56px;height:56px;border-radius:50%;background:var(--green-l);border:2px solid var(--green-b);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:20px;color:var(--green);font-weight:600;flex-shrink:0;}
.psw-info{flex:1;}
.psw-name{font-size:16px;font-weight:600;margin-bottom:2px;color:var(--text);}
.psw-title{font-size:12px;color:var(--muted);}
.psw-schedule{font-size:12px;color:var(--accent);margin-top:4px;font-weight:500;}

/* VISIT ROWS */
.visit-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px;transition:background .12s;cursor:pointer;}
.visit-row:last-child{border:none;}
.visit-row:hover{background:var(--surface);}
.visit-date-box{width:44px;text-align:center;flex-shrink:0;}
.visit-date-day{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:500;}
.visit-date-num{font-family:'Inter',sans-serif;font-size:22px;color:var(--text);line-height:1;font-weight:600;}
.visit-info{flex:1;}
.visit-psw{font-size:14px;font-weight:500;color:var(--text);}
.visit-time{font-size:12px;color:var(--muted);margin-top:2px;}
.visit-hours{font-size:13px;font-weight:600;color:var(--accent);}

/* DOCS */
.doc-row{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;text-decoration:none;color:inherit;transition:background 0.15s;}
.doc-row:last-child{border:none;}
.doc-row:hover{background:var(--surface);}
.doc-icon{width:36px;height:36px;border-radius:10px;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green);}
.doc-icon svg{width:18px;height:18px;}
.doc-info{flex:1;}
.doc-name{font-size:14px;font-weight:500;color:var(--text);}
.doc-type{font-size:12px;color:var(--muted);margin-top:1px;}
.doc-arrow{color:var(--muted);}
.doc-arrow svg{width:16px;height:16px;display:block;}

/* INVOICE ROWS */
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);transition:background 0.15s;}
.inv-row:last-child{border:none;}
.inv-row:hover{background:var(--surface);}
.inv-month{font-size:14px;font-weight:500;color:var(--text);}
.inv-right{text-align:right;}
.inv-amount{font-size:14px;font-weight:600;color:var(--accent);}
.inv-status{font-size:11px;color:var(--muted);margin-top:2px;}

/* MESSAGE THREAD */
.msg-thread-wrap{background:var(--bg);border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid var(--border);margin-bottom:24px;}
.msg-thread-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto;}
.msg-bubble-out{background:var(--green);color:#fff;padding:10px 14px;border-radius:14px 14px 3px 14px;max-width:85%;margin-left:auto;font-size:13px;line-height:1.5;}
.msg-bubble-in{background:var(--surface);color:var(--text);padding:10px 14px;border-radius:14px 14px 14px 3px;max-width:85%;border:1px solid var(--border);font-size:13px;line-height:1.5;}
.msg-bubble-time{font-size:10px;opacity:.55;margin-top:3px;}
.msg-input-row{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border);align-items:flex-end;}
.msg-input-field{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);outline:none;resize:none;transition:border-color 0.15s;}
.msg-input-field:focus{border-color:var(--accent);}
.msg-send-btn{width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background 0.15s;}
.msg-send-btn:hover{background:var(--green-d);}
.msg-send-btn svg{width:18px;height:18px;}
.msg-char-count{font-size:11px;color:var(--muted);text-align:right;padding:0 20px 8px;font-family:'Inter',sans-serif;}
.msg-char-count.near{color:var(--warning);}
.msg-char-count.over{color:var(--error);}

/* VISIT DETAIL */
.visit-detail{padding:12px 20px 16px;border-top:1px solid var(--border);background:var(--surface);}
.visit-detail-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;margin-top:10px;font-weight:600;}
.visit-detail-val{font-size:13px;color:var(--text);line-height:1.6;}
.visit-expand-btn{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block;font-weight:500;}

/* UPCOMING */
.upcoming-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);gap:12px;transition:background 0.15s;}
.upcoming-row:last-child{border:none;}
.upcoming-row:hover{background:var(--surface);}
.upcoming-date{width:40px;text-align:center;flex-shrink:0;}
.upcoming-date-dow{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:500;}
.upcoming-date-num{font-family:'Inter',sans-serif;font-size:20px;color:var(--text);line-height:1;font-weight:600;}
.upcoming-info{flex:1;}
.upcoming-psw{font-size:13px;font-weight:500;color:var(--text);}
.upcoming-time{font-size:12px;color:var(--muted);margin-top:2px;}
.upcoming-badge{font-size:10px;padding:3px 10px;border-radius:100px;background:var(--green-l);color:var(--green);font-weight:600;flex-shrink:0;}

/* CARE PLAN */
.plan-text{padding:20px;font-size:14px;color:var(--text);line-height:1.8;}

/* EMPTY STATES */
.empty-state{padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.empty-state-icon{color:var(--muted);opacity:0.45;}
.empty-state-icon svg{width:48px;height:48px;}
.empty-state-title{font-size:16px;font-weight:500;color:var(--text);}
.empty-state-sub{font-size:14px;color:var(--muted);line-height:1.5;max-width:240px;}

/* LOADING */
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:12px 4px 14px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Inter',sans-serif;transition:color 0.15s;color:var(--muted);touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.nav-icon{display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color 0.15s;}
.nav-icon svg{width:22px;height:22px;}
.nav-label{font-size:10px;letter-spacing:0.02em;color:var(--muted);transition:color 0.15s;font-weight:500;}
.nav-btn.on .nav-label{color:var(--green);}
.nav-btn.on .nav-icon{color:var(--green);}

/* SATISFACTION STARS */
.visit-stars{display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap;}
.visit-stars.rated{font-size:14px;color:#c8a040;letter-spacing:1px;}
.visit-stars.unrated .star-btn{background:none;border:none;font-size:18px;color:#c8d0c8;cursor:pointer;padding:0 1px;min-height:32px;min-width:28px;line-height:1;transition:color .15s;}
.visit-stars.unrated .star-btn:hover,.visit-stars.unrated .star-btn:focus{color:#c8a040;}
.stars-label{font-size:10px;color:var(--muted);letter-spacing:0.5px;margin-left:4px;}

/* SKELETON */
.skeleton-wrap{padding:24px 20px;}
.skeleton-block{border-radius:14px;background:linear-gradient(90deg,#f0f0f0 25%,#f8f8f8 50%,#f0f0f0 75%);background-size:200% 100%;animation:fam-shimmer 1.4s infinite;margin-bottom:14px;}
@keyframes fam-shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skeleton-status{height:120px;border-radius:20px;margin-bottom:24px;}
.skeleton-card-sm{height:80px;}
.skeleton-card-md{height:120px;}
.skeleton-card-lg{height:200px;}

button{transition:transform 50ms ease;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
button:active{transform:scale(0.98);}
.pin-btn:active{transform:scale(0.96);}
</style>

</head>
<body>

<!-- PIN GATE -->
<div class="gate" id="gate">
  <div class="gate-inner">
    <div class="gate-brand">Proximity <em>Care</em></div>
    <div class="gate-sub">Family Portal</div>
    <div class="gate-card" id="gateCard">
      <div class="gate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M10 21v-6h4v6"/></svg></div>
      <div class="gate-title">Welcome back.</div>
      <div class="gate-hint">Enter your 4-digit access code to view your care portal.<br><span style="font-size:13px;color:var(--muted);margin-top:6px;display:block;">Your code was included in the welcome email from Lance. Need help? Call 647-382-8047.</span></div>
      <div class="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn empty"></button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn del" onclick="pinDel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg></button>
      </div>
      <div class="pin-error" id="pinError">Wrong code. Try again.</div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="tb-brand" id="agency-logo"><span id="agency-name">Proximity <em>Care</em></span></div>
    <div class="tb-right">
      <span class="tb-name" id="tbName"></span>
      <button class="tb-signout" onclick="signOut()">Log out</button>
    </div>
  </div>

  <!-- ETA banner — shows when PSW is en route -->
  <div id="eta-banner" class="eta-banner" style="display:none;">
    <div class="eta-dot"></div>
    <div>
      <div class="eta-text" id="eta-text">Your PSW is on the way</div>
      <div class="eta-time" id="eta-time"></div>
    </div>
  </div>

  <!-- Client alert badges -->
  <div id="alert-badges-banner" style="display:none;padding:10px 16px 0;"></div>

  <div class="content" id="contentArea">
    <div class="skeleton-wrap">
      <div class="skeleton-block skeleton-status"></div>
      <div class="skeleton-block skeleton-card-sm"></div>
      <div class="skeleton-block skeleton-card-md"></div>
      <div class="skeleton-block skeleton-card-lg"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn on" id="nav-home" onclick="showTab('home')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M10 21v-6h4v6"/></svg></span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" id="nav-visits" onclick="showTab('visits')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 11h16M9 15h2M9 18h6"/></svg></span>
      <span class="nav-label">Visits</span>
    </button>
    <button class="nav-btn" id="nav-care" onclick="showTab('care')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
      <span class="nav-label">Care Plan</span>
    </button>
    <button class="nav-btn" id="nav-ask" onclick="showTab('ask')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
      <span class="nav-label">Ask</span>
    </button>
    <button class="nav-btn" id="nav-billing" onclick="showTab('billing')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><path d="M7 15h3"/></svg></span>
      <span class="nav-label">Billing</span>
    </button>
  </nav>
</div>

<script>
const R = 'https://proximity-agent-production.up.railway.app';

// ── XSS GUARD ──
function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
let slug = '', pinVal = '', portalData = null, clientSlug = '';
let famVisitRange = 'month';
let famCustomFrom = '';
let famCustomTo = '';

const params = new URLSearchParams(window.location.search);
slug = params.get('c') || ''; clientSlug = slug;

// ── PIN LOGIC ──
function pinPress(d) {
  if (pinVal.length >= 4) return;
  pinVal += d;
  updateDots();
  if (pinVal.length === 4) setTimeout(verifyPin, 200);
}

function pinDel() {
  pinVal = pinVal.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinVal.length);
  }
}

async function verifyPin() {
  try {
    const r = await fetch(`${R}/family/verify-pin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, pin: pinVal })
    });
    const d = await r.json();
    if (d.success) {
      try { sessionStorage.setItem('family_pin_' + slug, pinVal); } catch(e) {}
      document.getElementById('gate').classList.add('hide');
      document.getElementById('app').classList.add('show');
      document.getElementById('tbName').textContent = d.client.first_name + ' ' + d.client.last_name;
      loadPortal();
      setTimeout(requestPushPermission, 2000);
    } else {
      showPinError();
    }
  } catch (e) {
    showPinError();
  }
}

function showPinError() {
  document.getElementById('pinError').classList.add('show');
  const card = document.getElementById('gateCard');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  setTimeout(() => card.classList.remove('shake'), 400);
  pinVal = '';
  updateDots();
  setTimeout(() => document.getElementById('pinError').classList.remove('show'), 2500);
}

function signOut() {
  try { sessionStorage.removeItem('family_pin_' + slug); } catch(e) {}
  pinVal = '';
  updateDots();
  portalData = null;
  document.getElementById('gate').classList.remove('hide');
  document.getElementById('app').classList.remove('show');
}

// ── LOAD PORTAL ──

// ── ETA BANNER — shows when PSW is en route ──
async function loadETABanner() {
  try {
    if (!clientSlug) return;
    // Check system_logs for recent en_route event for this client
    const r = await fetch(`${R}/family/portal/${clientSlug}`);
    if (!r.ok) return;
    const d = await r.json();
    // Check if any recent en_route in last 2 hours
    const logs = d.recent_activity || d.system_logs || [];
    const enRoute = logs.find(l => l.event_type === 'en_route' || l.event_type === 'visit.en-route.sent');
    const banner = document.getElementById('eta-banner');
    const etaText = document.getElementById('eta-text');
    const etaTime = document.getElementById('eta-time');
    if (!banner) return;
    // If active visit exists, hide ETA
    const hasActive = (d.visits||[]).some(v => v.time_in && !v.time_out);
    if (hasActive) { banner.style.display = 'none'; return; }
    if (enRoute && enRoute.created_at) {
      const age = (Date.now() - new Date(enRoute.created_at)) / 60000;
      if (age < 120) { // within 2 hours
        const pswFirst = (enRoute.psw_name || 'Your PSW').split(' ')[0];
        if (etaText) etaText.textContent = pswFirst + ' is on the way to you';
        if (etaTime) etaTime.textContent = 'Notified ' + Math.round(age) + ' min ago';
        banner.style.display = 'flex';
        return;
      }
    }
    banner.style.display = 'none';
  } catch { }
}

// ── ALERT BADGES — fall risk, allergy, environment from care notes ──
function loadAlertBadges() {
  const bannerEl = document.getElementById('alert-badges-banner');
  if (!bannerEl || !portalData) return;
  const client = portalData.client || {};
  const careText = ((client.care_notes||'') + ' ' + (client.care_directives||'')).toLowerCase();
  let badges = '';
  if (/fall|falls|fall risk/.test(careText)) badges += '<span class="client-alert-chip fall">⚠ Fall Risk</span>';

}

function loadCarePlanAck() {
  // Check localStorage for care plan ack by assigned PSW
  const pswName = portalData?.psw?.name || '';
  const clientName = portalData?.client?.first_name || '';
  if (!pswName || !clientName) return;
  try {
    const key = 'cp_ack_' + pswName.replace(/\s+/g,'_') + '_' + clientName.replace(/\s+/g,'_');
    const stored = localStorage.getItem(key);
    if (stored) {
      const d = new Date(stored);
      const daysSince = Math.floor((Date.now() - d) / 86400000);
      // Find a good place to show this — add to PSW card area
      const pswCard = document.querySelector('.psw-card');
      if (pswCard && !document.getElementById('care-ack-chip')) {
        const chip = document.createElement('div');
        chip.id = 'care-ack-chip';
        chip.className = 'care-ack-chip';
        chip.innerHTML = '✓ Care plan reviewed ' + (daysSince === 0 ? 'today' : daysSince + ' days ago');
        pswCard.appendChild(chip);
      }
    }
  } catch {}
}

window._visitVitals = {};

function formatVitalsCompact(v) {
  if (!v) return '';
  const pills = [];
  if (v.blood_pressure_systolic && v.blood_pressure_diastolic) {
    const flag = v.blood_pressure_systolic > 140 || v.blood_pressure_diastolic > 90;
    pills.push(`<span class="vitals-pill ${flag?'flag':'ok'}">BP ${v.blood_pressure_systolic}/${v.blood_pressure_diastolic}</span>`);
  }
  if (v.pulse) pills.push(`<span class="vitals-pill ok">Pulse ${v.pulse}</span>`);
  if (v.oxygen_saturation) {
    const flag = v.oxygen_saturation < 95;
    pills.push(`<span class="vitals-pill ${flag?'flag':'ok'}">O₂ ${v.oxygen_saturation}%</span>`);
  }
  if (v.temperature) {
    const flag = v.temperature > 38.5;
    pills.push(`<span class="vitals-pill ${flag?'flag':'ok'}">${v.temperature}°C</span>`);
  }
  if (!pills.length) return '';
  const allNormal = !v.flagged;
  return pills.join('') + (allNormal ? '<div style="font-family:var(--mono);font-size:11px;color:var(--teal2);margin-top:4px;">✓ All readings within normal range</div>' : '<div style="font-family:var(--mono);font-size:11px;color:var(--amber);margin-top:4px;">⚠ Some readings flagged — coordinator notified</div>');
}

function getFamDateRange() {
  const now = new Date();
  const toISO = d => d.toISOString().slice(0, 10);
  const y = now.getFullYear(), m = now.getMonth(), day = now.getDate();
  if (famVisitRange === 'today') {
    const d = toISO(now); return { from: d, to: d, label: 'Today' };
  }
  if (famVisitRange === 'week') {
    const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
    const start = new Date(now); start.setDate(day - dow); start.setHours(0,0,0,0);
    return { from: toISO(start), to: toISO(now), label: 'This Week' };
  }
  if (famVisitRange === 'month') {
    return { from: toISO(new Date(y, m, 1)), to: toISO(now), label: now.toLocaleString('en-CA', { month: 'long', year: 'numeric' }) };
  }
  if (famVisitRange === 'lastmonth') {
    const start = new Date(y, m - 1, 1);
    const end = new Date(y, m, 0);
    return { from: toISO(start), to: toISO(end), label: start.toLocaleString('en-CA', { month: 'long', year: 'numeric' }) };
  }
  if (famVisitRange === 'year') {
    return { from: toISO(new Date(y, 0, 1)), to: toISO(now), label: String(y) };
  }
  if (famVisitRange === 'custom' && famCustomFrom && famCustomTo) {
    return { from: famCustomFrom, to: famCustomTo, label: famCustomFrom + ' to ' + famCustomTo };
  }
  return { from: toISO(new Date(y, m, 1)), to: toISO(now), label: now.toLocaleString('en-CA', { month: 'long', year: 'numeric' }) };
}

function setFamRange(mode) {
  famVisitRange = mode;
  if (mode !== 'custom') { famCustomFrom = ''; famCustomTo = ''; }
  showTab('visits');
}

function applyFamCustomRange() {
  const f = document.getElementById('fam-custom-from')?.value;
  const t = document.getElementById('fam-custom-to')?.value;
  if (!f || !t) return;
  if (f > t) return;
  famCustomFrom = f; famCustomTo = t;
  showTab('visits');
}

function emptyState(iconSvg, title, sub) {
  return `<div class="empty-state"><div class="empty-state-icon">${iconSvg}</div><div class="empty-state-title">${title}</div><div class="empty-state-sub">${sub}</div></div>`;
}

function updateCharCount(ta) {
  const el = document.getElementById('msgCharCount');
  if (!el) return;
  const len = (ta.value || '').length;
  el.style.display = len > 0 ? 'block' : 'none';
  el.textContent = `${len} / 500`;
  el.className = 'msg-char-count' + (len > 450 ? ' near' : '') + (len >= 500 ? ' over' : '');
}

function visitRow(v) {
  const d = new Date((v.visit_date || '') + 'T12:00:00');
  const day = d.toLocaleDateString('en-CA', { weekday: 'short' });
  const num = d.getDate();
  const hrs = parseFloat(v.hours_worked || 0).toFixed(1);
  const tin = v.time_in ? fmtTime(v.time_in) : '';
  const tout = v.time_out ? fmtTime(v.time_out) : '';
  const fallbackPSW = (portalData && portalData.psw && portalData.psw.name) ? portalData.psw.name : 'PSW';
  const rated = v.satisfaction_rating;
  const summary = v.visit_summary || '';
  const tasks = Array.isArray(v.tasks_completed) ? v.tasks_completed.join(', ') : (v.tasks_completed || '');
  const mood = v.client_mood || '';
  const vid = 'vd_' + (v.id || Math.random().toString(36).slice(2));

  const starsHtml = rated
    ? `<div class="visit-stars rated">${'★'.repeat(rated)}${'☆'.repeat(5 - rated)}<span class="stars-label">Rated ${rated}/5</span></div>`
    : `<div class="visit-stars unrated">${[1,2,3,4,5].map(s =>
        `<button class="star-btn" onclick="rateVisit('${v.id}','${(clientSlug||'')}',${s},this)" aria-label="${s} star">☆</button>`
      ).join('')}<span class="stars-label">Rate this visit</span></div>`;

  const hasDetail = summary || tasks || mood || v.notes;
  const detailHtml = hasDetail ? `
    <div id="${vid}" style="display:none;">
      <div class="visit-detail">
        ${summary ? `<div class="visit-detail-lbl">Care Summary</div><div class="visit-detail-val">${summary}</div>` : ''}
        ${mood ? `<div class="visit-detail-lbl">Client Mood</div><div class="visit-detail-val">${mood}</div>` : ''}
        ${tasks ? `<div class="visit-detail-lbl">Tasks Completed</div><div class="visit-detail-val">${tasks}</div>` : ''}
        ${v.notes ? `<div class="visit-detail-lbl">Notes</div><div class="visit-detail-val">${v.notes}</div>` : ''}
        ${v.incident_reported ? `<div class="visit-detail-lbl" style="color:var(--error);">Incident Reported</div><div class="visit-detail-val" style="color:var(--error);">An incident was reported during this visit. Your coordinator has been notified.</div>` : ''}
        ${v.meds_given && Array.isArray(v.meds_given) && v.meds_given.length ? `<div class="visit-detail-lbl">Medications Given</div><div class="visit-detail-val">${v.meds_given.join(', ')}</div>` : ''}
        ${(window._visitVitals && window._visitVitals[v.id]) ? `<div class="visit-detail-lbl">Health Readings</div><div class="vitals-compact">${formatVitalsCompact(window._visitVitals[v.id])}</div>` : ''}
        ${starsHtml}
      </div>
    </div>` : '';

  return `<div class="visit-row" ${hasDetail ? `onclick="toggleVisitDetail('${vid}',this)" style="cursor:pointer;"` : ''}>
    <div class="visit-date-box">
      <div class="visit-date-day">${day}</div>
      <div class="visit-date-num">${num}</div>
    </div>
    <div class="visit-info" style="flex:1;min-width:0;">
      <div class="visit-psw">${v.psw_name || fallbackPSW}</div>
      <div class="visit-time">${tin}${tout ? ' \u2013 ' + tout : ''}</div>
      ${!hasDetail ? starsHtml : '<div class="visit-expand-btn">View details \u203a</div>'}
    </div>
    <div class="visit-hours">${hrs} hrs</div>
  </div>${detailHtml}`;
}

function toggleVisitDetail(id, row) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  const btn = row.querySelector('.visit-expand-btn');
  if (btn) btn.textContent = open ? 'View details \u203a' : 'Hide details \u02c4';
}

async function rateVisit(visitId, slug, rating, btn) {
  const row = btn.closest('.visit-stars');
  if (!row) return;
  const btns = row.querySelectorAll('.star-btn');
  btns.forEach((b, i) => { b.textContent = i < rating ? '★' : '☆'; b.disabled = true; });
  try {
    const res = await fetch(`${R}/family/rate-visit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: (slug||clientSlug||''), visit_id: visitId, rating, pin: sessionStorage.getItem('family_pin_' + (slug||clientSlug||'')) || '' })
    });
    const d = await res.json();
    if (!d.success) throw new Error(d.error || 'Rating failed');
    row.innerHTML = `${'★'.repeat(rating)}${'☆'.repeat(5-rating)} <span class="stars-label">Rated ${rating}/5 — thank you</span>`;
    row.classList.replace('unrated','rated');
  } catch(e) {
    btns.forEach(b => { b.textContent = '☆'; b.disabled = false; });
    alert('Could not save rating. Please try again.');
  }
}

  const t = (type || '').toLowerCase();
  if (t.includes('resume') || t.includes('cv')) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg>';
  }
  if (t.includes('cpr') || t.includes('cert')) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/><path d="M9 12l2 2 4-4"/></svg>';
  }
  if (t.includes('photo') || t.includes('id')) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M14 10h4M14 13h3M5 17c1-2 3-3 4-3s3 1 4 3"/></svg>';
  }
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11l-9 9a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5l-8.5 8.5a2 2 0 0 1-3-3l7-7"/></svg>';
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'America/Toronto' });
}

// ── MESSAGING ──
function renderMsgThread(messages) {
  if (!messages || !messages.length) {
    return '<div style="text-align:center;padding:24px 16px;font-size:13px;color:var(--muted);">No messages yet. Send us a note below.</div>';
  }
  return messages.map(m => {
    const isOut = m.sender === 'family' || m.sender === 'client';
    const time = m.created_at ? new Date(m.created_at).toLocaleDateString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Toronto'}) : '';
    return `<div class="${isOut ? 'msg-bubble-out' : 'msg-bubble-in'}">
      <div>${escHtml(m.message||m.body||'')}</div>
      <div class="msg-bubble-time">${time}</div>
    </div>`;
  }).join('');
}

async function loadFamilyMessages() {
  try {
    const res = await fetch(`${R}/family/portal/${slug}`);
    const d = await res.json();
    if (d.messages) {
      const thread = document.getElementById('home-msg-thread');
      if (thread) {
        thread.innerHTML = renderMsgThread(d.messages);
        thread.scrollTop = thread.scrollHeight;
      }
    }
  } catch {}
}

async function sendMsg() {
  const ta = document.getElementById('msgTa');
  const msg = ta?.value?.trim();
  if (!msg) return;
  ta.value = ''; ta.style.height = 'auto';
  const cc = document.getElementById('msgCharCount');
  if (cc) cc.style.display = 'none';
  try {
    await fetch(`${R}/family/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, message: msg })
    });
    await loadFamilyMessages();
  } catch (e) {}
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
}

async function requestPushPermission() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const permission = await Notification.requestPermission();
    if (permission === 'granted') { await subscribeToPush(); }
  } catch (e) { console.log('Push permission error:', e); }
}

async function subscribeToPush() {
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    await sendSubscriptionToServer(sub);
  } catch (e) { console.log('Push subscribe error:', e); }
}

async function sendSubscriptionToServer(subscription) {
  try {
    await fetch(`${R}/family/push-subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, subscription: subscription.toJSON() })
    });
  } catch (e) { console.log('Push server save error:', e); }
}

// ── PSW PROFILE MODAL ──
function showPSWProfile(name, initials) {
  const overlay = document.getElementById('psw-modal-overlay');
  const modal = document.getElementById('psw-modal');
  const avatarEl = document.getElementById('psw-modal-avatar');
  const nameEl = document.getElementById('psw-modal-name');
  const bodyEl = document.getElementById('psw-modal-body');
  if (!overlay || !modal) return;

  avatarEl.textContent = initials || (name||'').charAt(0).toUpperCase();
  nameEl.textContent = name;

  const visits = (portalData && portalData.visits) || [];
  const pswVisits = visits.filter(v => v.psw_name === name);
  const totalVisits = pswVisits.length;
  const rated = pswVisits.filter(v => v.satisfaction_rating);
  const avgRating = rated.length ? (rated.reduce((s,v) => s + v.satisfaction_rating, 0) / rated.length).toFixed(1) : null;
  const isAssigned = portalData && portalData.psw && portalData.psw.name === name;
  const recentVisits = pswVisits.slice(0, 5);

  bodyEl.innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:20px;">
      <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:700;color:var(--accent);">${totalVisits}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">Visits</div>
      </div>
      ${avgRating ? `<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--accent);">${avgRating}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">Avg Rating</div></div>` : ''}
      ${isAssigned ? `<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;"><div style="font-size:12px;font-weight:700;color:var(--accent);">Primary</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">Assigned PSW</div></div>` : ''}
    </div>
    ${recentVisits.length ? `
    <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Recent Visits</div>
    ${recentVisits.map(v => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:13px;color:var(--text);">${fmtDate(v.visit_date)}</div>
        <div style="font-size:12px;color:var(--muted);">${parseFloat(v.hours_worked||0).toFixed(1)}h</div>
        ${v.satisfaction_rating ? `<div style="color:var(--accent);">${'★'.repeat(v.satisfaction_rating)}${'☆'.repeat(5-v.satisfaction_rating)}</div>` : '<div style="font-size:12px;color:var(--muted);">Not rated</div>'}
      </div>`).join('')}
    ` : '<div style="color:var(--muted);font-size:13px;">No visit history yet.</div>'}
  `;

  overlay.style.display = 'block';
  modal.style.display = 'block';
}

function closePSWProfile() {
  const overlay = document.getElementById('psw-modal-overlay');
  const modal = document.getElementById('psw-modal');
  if (overlay) overlay.style.display = 'none';
  if (modal) modal.style.display = 'none';
}

// ── CARE PLAN PDF DOWNLOAD ──
async function downloadCarePlanPDF() {
  if (!portalData || !clientSlug) return;
  try {
    showToast('Generating PDF...');
    const res = await fetch(`${R}/family/care-plan-pdf/${clientSlug}`);
    if (!res.ok) throw new Error('Could not generate PDF');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `care-plan-${clientSlug}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    showToast('PDF not available yet', 'err');
  }
}


// ── PRIVATE NOTE ──
function updateNoteCount(el) {
  const count = el.value.length;
  const countEl = document.getElementById('note-char-count');
  if (countEl) { countEl.textContent = count + ' / 600'; countEl.style.color = count > 550 ? 'var(--error)' : 'var(--muted)'; }
}

let _perfRating = 0;

function setPerfRating(n) {
  _perfRating = n;
  const stars = document.querySelectorAll('#perf-stars button');
  stars.forEach((btn, i) => { btn.textContent = i < n ? '★' : '☆'; });
}

async function submitPrivateNote(visitDate, pswName) {
  const input = document.getElementById('private-note-input');
  const successEl = document.getElementById('note-success');
  if (!input || !input.value.trim()) return;
  const note = input.value.trim();

  // Get PSW from dropdown if present
  const pswSelect = document.getElementById('feedback-psw-select');
  const selectedPSW = pswSelect ? pswSelect.value : (pswName || '');
  const rating = _perfRating > 0 ? `[Rating: ${_perfRating}/5] ` : '';
  const pswTag = selectedPSW ? `[Re: ${selectedPSW}] ` : (visitDate && pswName ? `[Re: ${pswName} on ${visitDate}] ` : '');
  const contextNote = `${pswTag}${rating}${note}`;

  try {
    const res = await fetch(`${R}/family/private-note`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: clientSlug || slug, pin: pinVal, note: contextNote })
    });
    const d = await res.json();
    if (!d.success) throw new Error(d.error || 'Failed');
    input.value = '';
    if (pswSelect) pswSelect.value = '';
    _perfRating = 0;
    document.querySelectorAll('#perf-stars button').forEach(b => b.textContent = '☆');
    const countEl = document.getElementById('note-char-count');
    if (countEl) countEl.textContent = '0 / 600';
    if (successEl) { successEl.style.display = 'block'; setTimeout(() => { if(successEl) successEl.style.display = 'none'; }, 5000); }
  } catch(e) {
    alert('Could not send note. Please try again.');
  }
}


function scrollToNoteWithContext(visitDate, pswName) {
  const input = document.getElementById('private-note-input');
  if (!input) { showTab('visits'); setTimeout(() => scrollToNoteWithContext(visitDate, pswName), 200); return; }
  // Pre-fill with context
  if (visitDate || pswName) {
    const ctx = pswName ? `Re: ${pswName}${visitDate ? ' on ' + visitDate : ''} — ` : '';
    if (!input.value) { input.value = ctx; input.selectionStart = input.selectionEnd = ctx.length; }
  }
  input.scrollIntoView({ behavior: 'smooth', block: 'center' });
  input.focus();
}


function fmtTime(str) {
  if (!str) return '';
  if (str.includes('T') || str.includes('Z') || str.includes('+')) {
    return new Date(str).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',timeZone:'America/Toronto'});
  }
  const [h,m] = str.split(':');
  const d = new Date(); d.setUTCHours(parseInt(h), parseInt(m), 0, 0);
  return d.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',timeZone:'America/Toronto'});
}
