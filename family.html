<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#1a6b5a"/>
<title>Family Portal — Proximity Care</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f2ee;--white:#ffffff;--dark:#0f1a14;
  --green:#1a6b5a;--green-l:#e8f5f1;--green-b:#c8e6dc;--green-d:#0b4035;
  --green3:#3aaa8a;
  --muted:#7a7a72;--border:#e2ddd4;--shadow:rgba(0,0,0,0.06);
  --teal:#3d8a7a;--teal-l:#e8f3f5;
}
html,body{min-height:100vh;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased;}
.mono{font-family:'DM Mono',monospace;}

/* PIN GATE */
.gate{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.gate.hide{display:none;}
.gate-inner{width:100%;max-width:380px;}
.gate-brand{font-family:'Lora',serif;font-size:22px;font-weight:500;color:var(--dark);text-align:center;margin-bottom:4px;}
.gate-brand em{color:var(--green);font-style:italic;}
.gate-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:40px;}
.gate-card{background:var(--white);border-radius:20px;padding:36px 28px;box-shadow:0 8px 40px var(--shadow);}
.gate-icon{width:56px;height:56px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--green);}
.gate-icon svg{width:28px;height:28px;}
.gate-title{font-family:'Lora',serif;font-size:22px;text-align:center;margin-bottom:6px;}
.gate-hint{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all 0.2s;}
.pin-dot.filled{background:var(--green);border-color:var(--green);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-btn{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:16px;font-size:20px;font-weight:500;font-family:'Poppins',sans-serif;color:var(--dark);cursor:pointer;transition:all 0.15s;text-align:center;}
.pin-btn:hover{background:var(--green-l);border-color:var(--green);}
.pin-btn:active{transform:scale(0.95);}
.pin-btn.del{font-size:16px;color:var(--muted);}
.pin-btn.empty{background:none;border:none;cursor:default;}
.pin-error{text-align:center;font-size:13px;color:#e05a6a;margin-top:16px;opacity:0;transition:opacity 0.2s;min-height:20px;}
.pin-error.show{opacity:1;}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh;}
.app.show{display:flex;}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.tb-brand{font-family:'Lora',serif;font-size:17px;font-weight:500;}
.tb-brand em{color:var(--green);font-style:italic;}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-name{font-size:13px;color:var(--muted);}
.tb-signout{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;padding:6px 10px;border-radius:6px;font-family:'Poppins',sans-serif;transition:color 0.15s;}
.tb-signout:hover{color:var(--dark);}

/* CONTENT */
.content{flex:1;padding:20px;max-width:560px;margin:0 auto;width:100%;}

/* STATUS CARD */
.status-card{background:var(--green);border-radius:18px;padding:24px;margin-bottom:16px;color:white;position:relative;overflow:hidden;}
.status-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06);}
.status-eyebrow{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.7;margin-bottom:6px;}
.status-name{font-family:'Lora',serif;font-size:24px;font-weight:500;margin-bottom:4px;}
.status-detail{font-size:13px;opacity:0.8;line-height:1.5;}
.status-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:100px;padding:5px 12px;font-size:12px;margin-top:12px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#7dffb3;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* SECTION */
.section{margin-bottom:16px;}
.section-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding:0 2px;}

/* CARDS */
.card{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);}
.card-row:last-child{border:none;}
.card-row-label{font-size:13px;color:var(--muted);}
.card-row-value{font-size:14px;font-weight:500;text-align:right;}
.card-row-value.green{color:var(--green);}

/* PSW CARD */
.psw-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 2px 12px var(--shadow);display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.psw-avatar{width:56px;height:56px;border-radius:50%;background:var(--green-l);border:2px solid var(--green-b);display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:20px;color:var(--green);font-weight:500;flex-shrink:0;}
.psw-info{flex:1;}
.psw-name{font-size:16px;font-weight:600;margin-bottom:2px;}
.psw-title{font-size:12px;color:var(--muted);}
.psw-schedule{font-size:12px;color:var(--green);margin-top:4px;}

/* VISIT ROWS */
.visit-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:14px;}
.visit-row:last-child{border:none;}
.visit-date-box{width:44px;text-align:center;flex-shrink:0;}
.visit-date-day{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.visit-date-num{font-family:'Lora',serif;font-size:22px;color:var(--dark);line-height:1;}
.visit-info{flex:1;}
.visit-psw{font-size:14px;font-weight:500;}
.visit-time{font-size:12px;color:var(--muted);margin-top:2px;}
.visit-hours{font-size:13px;font-weight:600;color:var(--green);}

/* DOCS */
.doc-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:12px;text-decoration:none;color:inherit;}
.doc-row:last-child{border:none;}
.doc-icon{width:36px;height:36px;border-radius:10px;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green);}
.doc-icon svg{width:18px;height:18px;}
.doc-info{flex:1;}
.doc-name{font-size:14px;font-weight:500;}
.doc-type{font-size:12px;color:var(--muted);margin-top:1px;}
.doc-arrow{font-size:16px;color:var(--muted);}

/* INVOICE ROWS */
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.inv-row:last-child{border:none;}
.inv-month{font-size:14px;font-weight:500;}
.inv-right{text-align:right;}
.inv-amount{font-size:14px;font-weight:600;color:var(--green);}
.inv-status{font-size:11px;color:var(--muted);margin-top:2px;}

/* MESSAGE */
.msg-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 2px 12px var(--shadow);}
.msg-label{font-size:13px;color:var(--muted);margin-bottom:10px;}
.msg-ta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Poppins',sans-serif;color:var(--dark);outline:none;resize:none;min-height:80px;transition:border-color 0.2s;}
.msg-ta:focus{border-color:var(--green);}
.msg-btn{margin-top:10px;background:var(--green);border:none;border-radius:10px;padding:12px 20px;color:white;font-size:13px;font-weight:500;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.2s;width:100%;}
.msg-btn:hover{background:var(--green-d);}
.msg-sent{font-size:13px;color:var(--green);text-align:center;margin-top:8px;display:none;}

/* MESSAGE THREAD */
.msg-thread-wrap{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px var(--shadow);margin-bottom:16px;}
.msg-thread-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.msg-thread-title{font-size:13px;font-weight:500;color:var(--dark);}
.msg-thread-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto;}
.msg-bubble-out{background:var(--green);color:#fff;padding:10px 14px;border-radius:14px 14px 3px 14px;max-width:85%;margin-left:auto;font-size:13px;line-height:1.5;}
.msg-bubble-in{background:var(--bg);color:var(--dark);padding:10px 14px;border-radius:14px 14px 14px 3px;max-width:85%;border:1px solid var(--border);font-size:13px;line-height:1.5;}
.msg-bubble-time{font-size:10px;opacity:.55;margin-top:3px;}
.msg-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);}
.msg-input-field{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:14px;font-family:'Poppins',sans-serif;color:var(--dark);outline:none;resize:none;}
.msg-input-field:focus{border-color:var(--green);}
.msg-send-btn{width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;}

/* VISIT DETAIL EXPAND */
.visit-detail{padding:12px 18px 14px;border-top:1px solid var(--border);background:rgba(0,0,0,.02);}
.visit-detail-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;margin-top:8px;}
.visit-detail-val{font-size:13px;color:var(--dark);line-height:1.6;}
.visit-expand-btn{font-size:11px;color:var(--green);cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block;}

/* UPCOMING SCHEDULE */
.upcoming-row{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);gap:12px;}
.upcoming-row:last-child{border:none;}
.upcoming-date{width:40px;text-align:center;flex-shrink:0;}
.upcoming-date-dow{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.upcoming-date-num{font-family:'Lora',serif;font-size:20px;color:var(--dark);line-height:1;}
.upcoming-info{flex:1;}
.upcoming-psw{font-size:13px;font-weight:500;color:var(--dark);}
.upcoming-time{font-size:12px;color:var(--muted);margin-top:2px;}
.upcoming-badge{font-size:10px;padding:2px 8px;border-radius:100px;background:var(--green-l);color:var(--green);font-weight:500;flex-shrink:0;}

/* CARE PLAN */
.plan-text{padding:18px;font-size:14px;color:var(--dark);line-height:1.75;font-family:'Lora',serif;}

/* EMPTY */
.empty{padding:32px;text-align:center;color:var(--muted);font-size:13px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--muted);}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:10;}
.nav-btn{flex:1;padding:12px 4px 16px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Poppins',sans-serif;transition:color 0.15s;color:var(--muted);}
.nav-icon{display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color 0.15s;}
.nav-icon svg{width:22px;height:22px;}
.nav-label{font-size:10px;letter-spacing:0.02em;color:var(--muted);transition:color 0.15s;}
.nav-btn.on .nav-label{color:var(--green);}
.nav-btn.on .nav-icon{color:var(--green);}

.tab{display:none;padding-bottom:80px;}
.tab.on{display:block;}
/* ── SATISFACTION STARS ── */
.visit-summary{font-size:12px;color:#4a6a5a;line-height:1.5;margin-top:4px;opacity:.85;}
.visit-stars{display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap;}
.visit-stars.rated{font-size:14px;color:#c8a040;letter-spacing:1px;}
.visit-stars.unrated .star-btn{background:none;border:none;font-size:18px;color:#c8d0c8;cursor:pointer;padding:0 1px;min-height:32px;min-width:28px;line-height:1;transition:color .15s;}
.visit-stars.unrated .star-btn:hover,.visit-stars.unrated .star-btn:focus{color:#c8a040;}
.stars-label{font-size:10px;color:#8a9a95;font-family:'DM Mono',monospace;letter-spacing:0.5px;margin-left:4px;}

/* SKELETON LOADER */
.skeleton-wrap{padding:20px;}
.skeleton-block{border-radius:14px;background:linear-gradient(90deg,#e8e4dc 25%,#f0ede8 50%,#e8e4dc 75%);background-size:200% 100%;animation:fam-shimmer 1.4s infinite;margin-bottom:14px;}
@keyframes fam-shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skeleton-status{height:120px;border-radius:18px;margin-bottom:16px;}
.skeleton-card-sm{height:80px;}
.skeleton-card-md{height:120px;}
.skeleton-card-lg{height:200px;}
</style>
</head>
<body>

<!-- PIN GATE -->
<div class="gate" id="gate">
  <div class="gate-inner">
    <div class="gate-brand">Proximity <em>Care</em></div>
    <div class="gate-sub">Family Portal</div>
    <div class="gate-card">
      <div class="gate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M10 21v-6h4v6"/></svg></div>
      <div class="gate-title">Welcome back.</div>
      <div class="gate-hint">Enter your 4-digit access code to view your care portal.</div>
      <div class="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn empty"></button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn del" onclick="pinDel()">⌫</button>
      </div>
      <div class="pin-error" id="pinError">Wrong code. Try again.</div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="tb-brand">Proximity <em>Care</em></div>
    <div class="tb-right">
      <span class="tb-name" id="tbName"></span>
      <button class="tb-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="content" id="contentArea">
    <div class="skeleton-wrap">
      <div class="skeleton-block skeleton-status"></div>
      <div class="skeleton-block skeleton-card-sm"></div>
      <div class="skeleton-block skeleton-card-md"></div>
      <div class="skeleton-block skeleton-card-lg"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn on" id="nav-home" onclick="showTab('home')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M10 21v-6h4v6"/></svg></span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" id="nav-visits" onclick="showTab('visits')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 11h16M9 15h2M9 18h6"/></svg></span>
      <span class="nav-label">Visits</span>
    </button>
    <button class="nav-btn" id="nav-care" onclick="showTab('care')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
      <span class="nav-label">Care Plan</span>
    </button>
    <button class="nav-btn" id="nav-docs" onclick="showTab('docs')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg></span>
      <span class="nav-label">Documents</span>
    </button>
    <button class="nav-btn" id="nav-billing" onclick="showTab('billing')">
      <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><path d="M7 15h3"/></svg></span>
      <span class="nav-label">Billing</span>
    </button>
  </nav>
</div>

<script>
const R = 'https://proximity-agent-production.up.railway.app';
let slug = '', pinVal = '', portalData = null, clientSlug = '';

// Get slug from URL
const params = new URLSearchParams(window.location.search);
slug = params.get('c') || ''; clientSlug = slug;

// PIN LOGIC
function pinPress(d) {
  if (pinVal.length >= 4) return;
  pinVal += d;
  updateDots();
  if (pinVal.length === 4) setTimeout(verifyPin, 200);
}

function pinDel() {
  pinVal = pinVal.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinVal.length);
  }
}

async function verifyPin() {
  try {
    const r = await fetch(`${R}/family/verify-pin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, pin: pinVal })
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('gate').classList.add('hide');
      document.getElementById('app').classList.add('show');
      document.getElementById('tbName').textContent = d.client.first_name + ' ' + d.client.last_name;
      loadPortal();
      setTimeout(requestPushPermission, 2000); // ask after portal loads
    } else {
      showPinError();
    }
  } catch (e) {
    showPinError();
  }
}

function showPinError() {
  document.getElementById('pinError').classList.add('show');
  pinVal = '';
  updateDots();
  setTimeout(() => document.getElementById('pinError').classList.remove('show'), 2500);
}

function signOut() {
  pinVal = '';
  updateDots();
  portalData = null;
  document.getElementById('gate').classList.remove('hide');
  document.getElementById('app').classList.remove('show');
}

// LOAD PORTAL
async function loadPortal() {
  try {
    const r = await fetch(`${R}/family/portal/${slug}`);
    portalData = await r.json();
    renderAll();
  } catch (e) {
    document.getElementById('contentArea').innerHTML = '<div class="empty">Could not load portal. Please try again.</div>';
  }
}

function renderAll() {
  try {
    const saved = localStorage.getItem('family_tab_'+slug);
    showTab(saved && ['home','visits','care','docs','billing'].includes(saved) ? saved : 'home');
  } catch(e) { showTab('home'); }
  // Load message thread after render
  setTimeout(loadFamilyMessages, 100);
}

// TABS
function showTab(tab) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('nav-' + tab).classList.add('on');
  try { localStorage.setItem('family_tab_'+slug, tab); } catch(e) {}
  if (!portalData) return;

  const c = document.getElementById('contentArea');

// HELPERS
function visitRow(v) {
  const d = new Date((v.visit_date || '') + 'T12:00:00');
  const day = d.toLocaleDateString('en-CA', { weekday: 'short' });
  const num = d.getDate();
  const hrs = parseFloat(v.hours_worked || 0).toFixed(1);
  const tin = v.time_in ? String(v.time_in).slice(0,5) : '';
  const tout = v.time_out ? String(v.time_out).slice(0,5) : '';
  const fallbackPSW = (portalData && portalData.psw && portalData.psw.name) ? portalData.psw.name : 'PSW';
  const rated = v.satisfaction_rating;
  const summary = v.visit_summary || '';
  const tasks = Array.isArray(v.tasks_completed) ? v.tasks_completed.join(', ') : (v.tasks_completed || '');
  const mood = v.client_mood || '';
  const vid = 'vd_' + (v.id || Math.random().toString(36).slice(2));

  const starsHtml = rated
    ? `<div class="visit-stars rated">${'★'.repeat(rated)}${'☆'.repeat(5 - rated)}<span class="stars-label">Rated ${rated}/5</span></div>`
    : `<div class="visit-stars unrated">${[1,2,3,4,5].map(s =>
        `<button class="star-btn" onclick="rateVisit('${v.id}','${(clientSlug||'')}',${s},this)" aria-label="${s} star">☆</button>`
      ).join('')}<span class="stars-label">Rate this visit</span></div>`;

  const hasDetail = summary || tasks || mood || v.notes;
  const detailHtml = hasDetail ? `
    <div id="${vid}" style="display:none;">
      <div class="visit-detail">
        ${summary ? `<div class="visit-detail-lbl">Care Summary</div><div class="visit-detail-val">${summary}</div>` : ''}
        ${mood ? `<div class="visit-detail-lbl">Client Mood</div><div class="visit-detail-val">${mood}</div>` : ''}
        ${tasks ? `<div class="visit-detail-lbl">Tasks Completed</div><div class="visit-detail-val">${tasks}</div>` : ''}
        ${v.notes ? `<div class="visit-detail-lbl">Notes</div><div class="visit-detail-val">${v.notes}</div>` : ''}
        ${v.incident_reported ? `<div class="visit-detail-lbl" style="color:#e05a6a;">Incident Reported</div><div class="visit-detail-val" style="color:#e05a6a;">${v.incident_notes||'See notes'}</div>` : ''}
        ${starsHtml}
      </div>
    </div>` : '';

  return `<div class="visit-row" ${hasDetail ? `onclick="toggleVisitDetail('${vid}',this)" style="cursor:pointer;"` : ''}>
    <div class="visit-date-box">
      <div class="visit-date-day">${day}</div>
      <div class="visit-date-num">${num}</div>
    </div>
    <div class="visit-info" style="flex:1;min-width:0;">
      <div class="visit-psw">${v.psw_name || fallbackPSW}</div>
      <div class="visit-time">${tin}${tout ? ' – ' + tout : ''}</div>
      ${!hasDetail ? starsHtml : '<div class="visit-expand-btn">View details ›</div>'}
    </div>
    <div class="visit-hours">${hrs} hrs</div>
  </div>${detailHtml}`;
}

function toggleVisitDetail(id, row) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  const btn = row.querySelector('.visit-expand-btn');
  if (btn) btn.textContent = open ? 'View details ›' : 'Hide details ‸';
}

async function rateVisit(visitId, slug, rating, btn) {
  // Animate selected stars
  const row = btn.closest('.visit-stars');
  if (!row) return;
  const btns = row.querySelectorAll('.star-btn');
  btns.forEach((b, i) => { b.textContent = i < rating ? '★' : '☆'; b.disabled = true; });

  try {
    const res = await fetch(`${R}/family/rate-visit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: (slug||clientSlug||''), visit_id: visitId, rating })
    });
    const d = await res.json();
    if (!d.success) throw new Error(d.error || 'Rating failed');
    row.innerHTML = `${'★'.repeat(rating)}${'☆'.repeat(5-rating)} <span class="stars-label">Rated ${rating}/5 — thank you</span>`;
    row.classList.replace('unrated','rated');
  } catch(e) {
    btns.forEach(b => { b.textContent = '☆'; b.disabled = false; });
    alert('Could not save rating. Please try again.');
  }
}

function docIcon(type) {
  const t = (type || '').toLowerCase();
  // Resume / CV — document with lines
  if (t.includes('resume') || t.includes('cv')) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg>';
  }
  // CPR / certification — shield with check
  if (t.includes('cpr') || t.includes('cert')) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/><path d="M9 12l2 2 4-4"/></svg>';
  }
  // Photo ID — person card
  if (t.includes('photo') || t.includes('id')) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M14 10h4M14 13h3M5 17c1-2 3-3 4-3s3 1 4 3"/></svg>';
  }
  // Generic — paperclip
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11l-9 9a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5l-8.5 8.5a2 2 0 0 1-3-3l7-7"/></svg>';
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── MESSAGING ──
function renderMsgThread(messages) {
  if (!messages || !messages.length) {
    return '<div style="text-align:center;padding:24px 16px;font-size:13px;color:var(--muted);">No messages yet. Send us a note below.</div>';
  }
  return messages.map(m => {
    const isOut = m.sender === 'family' || m.sender === 'client';
    const time = m.created_at ? new Date(m.created_at).toLocaleDateString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="${isOut ? 'msg-bubble-out' : 'msg-bubble-in'}">
      <div>${m.message||m.body||''}</div>
      <div class="msg-bubble-time">${time}</div>
    </div>`;
  }).join('');
}

async function loadFamilyMessages() {
  try {
    const res = await fetch(`${R}/family/portal/${slug}`);
    const d = await res.json();
    if (d.messages) {
      const thread = document.getElementById('home-msg-thread');
      if (thread) {
        thread.innerHTML = renderMsgThread(d.messages);
        thread.scrollTop = thread.scrollHeight;
      }
    }
  } catch {}
}

async function sendMsg() {
  const ta = document.getElementById('msgTa');
  const msg = ta?.value?.trim();
  if (!msg) return;
  ta.value = ''; ta.style.height = 'auto';
  try {
    await fetch(`${R}/family/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, message: msg })
    });
    await loadFamilyMessages();
  } catch (e) {}
}

// Auto-refresh every 60s — silently update portal data and messages
setInterval(async () => {
  try {
    if (!slug || !portalData) return;
    const res = await fetch(`${R}/family/portal/${slug}`);
    const d = await res.json();
    if (d.success) {
      portalData = d;
      // Silently re-render current tab
      const activeTab = document.querySelector('.nav-btn.on')?.id?.replace('nav-','');
      if (activeTab) showTab(activeTab);
      // Refresh message thread silently
      loadFamilyMessages();
    }
  } catch {}
}, 60000);

const VAPID_PUBLIC_KEY = 'BD9E2x87i80k-Yt8Ye09irrQQD3Xlf3EtCUIbbjwlwnYoPS6AHaX2_12rZ-7aKQs13WmXfKMx5A4aUuqr3M8wIk';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
}

async function requestPushPermission() {
  // Only run if service workers and push are supported
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
      await subscribeToPush();
    }
  } catch (e) { console.log('Push permission error:', e); }
}

async function subscribeToPush() {
  try {
    const reg = await navigator.serviceWorker.ready;
    // Check if already subscribed
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    await sendSubscriptionToServer(sub);
  } catch (e) { console.log('Push subscribe error:', e); }
}

async function sendSubscriptionToServer(subscription) {
  try {
    await fetch(`${R}/family/push-subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, subscription: subscription.toJSON() })
    });
  } catch (e) { console.log('Push server save error:', e); }
}

function renderPushPrompt() {
  // Show once — dismiss stores in localStorage
  if (!('Notification' in window)) return '';
  if (localStorage.getItem('push_dismissed_' + slug)) return '';
  if (Notification.permission === 'granted') return '';
  return `<div id="push-prompt" style="background:#fff8ec;border:1px solid #f0d9a0;border-radius:14px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;">
    <div style="font-size:22px;flex-shrink:0;">🔔</div>
    <div style="flex:1;">
      <div style="font-size:13px;font-weight:600;color:var(--dark);margin-bottom:4px;">Get notified when your caregiver arrives</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Instant alerts when visits start and end.</div>
      <div style="display:flex;gap:8px;">
        <button onclick="requestPushPermission();document.getElementById('push-prompt')?.remove();" style="background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:500;font-family:'Poppins',sans-serif;cursor:pointer;">Enable</button>
        <button onclick="localStorage.setItem('push_dismissed_'+slug,'1');document.getElementById('push-prompt')?.remove();" style="background:none;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--muted);font-family:'Poppins',sans-serif;cursor:pointer;">Not now</button>
      </div>
    </div>
  </div>`;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/family-sw.js').catch(() => {
    // Fallback: use PSW service worker scope if family-sw doesn't exist
  });
}
